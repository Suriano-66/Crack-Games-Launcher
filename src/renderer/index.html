<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Crack Games Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Fonds par serveur : vidéo ou photos (fondu croisé) -->
  <video id="bg-video-a" class="bg-layer" playsinline></video>
  <video id="bg-video-b" class="bg-layer" playsinline></video>
  <img id="bg-img-a" class="bg-layer" alt="" />
  <img id="bg-img-b" class="bg-layer" alt="" />
  <div class="bg-dim"></div>
  <div id="bg-fade"></div>

  <!-- Fond animé (particules connectées) -->
  <canvas id="bg-canvas"></canvas>

  <!-- Bannière de mise à jour -->
  <div id="update-banner" class="update-banner hidden">
    <span id="update-text">Mise à jour disponible...</span>
    <button id="btn-update" class="hidden">Redémarrer maintenant</button>
  </div>

  <!-- Zone de drag + boutons fenêtre -->
  <div class="titlebar">
    <span class="titlebar-brand">
      <img id="brand-logo" src="../../assets/logo.png" alt=""
           onerror="this.style.display='none';document.getElementById('brand-text').style.display='inline'" />
      <span id="brand-text" style="display:none"><b class="b1">CRACK</b><b class="b2">GAMES</b></span>
      <span id="app-version"></span>
    </span>
    <div class="links titlebar-links">
      <button class="btn-link" data-link="site">SITE WEB</button>
      <button class="btn-link" data-link="discord">DISCORD</button>
      <button class="btn-link btn-shop" data-link="boutique">🪙 BOUTIQUE</button>
    </div>
    <div class="titlebar-btns">
      <div class="player-chip hidden" id="player-chip">
        <img id="player-head" src="" alt="" />
        <span id="player-name"></span>
        <span class="chev">▾</span>
      </div>
      <button id="btn-settings" title="Paramètres">⚙</button>
      <button id="btn-min">─</button>
      <button id="btn-close">✕</button>
    </div>
  </div>
  <div id="account-menu" class="account-menu hidden"></div>

  <!-- Logo (remplacé par le logo du serveur sélectionné) -->
  <div class="logo-zone" id="logo-zone">
    <img id="logo-img" src="../../assets/logo.png" alt=""
         onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'" />
    <div id="logo-text" class="logo-text" style="display:none">
      <span class="l1">CRACK</span><span class="l2">GAMES</span>
    </div>
    <img id="logo-server" class="hidden" alt="" />
  </div>

  <!-- Écran de connexion -->
  <div id="screen-login" class="screen active">
    <div class="login-box">
      <div class="panel-title">— SE CONNECTER SUR CRACK GAMES —</div>
      <button id="btn-login" class="btn-ms">
        <svg width="18" height="18" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
        Se connecter avec Microsoft
      </button>
      <p id="login-status" class="status"></p>
    </div>
  </div>

  <!-- Écran principal -->
  <div id="screen-main" class="screen">
    <div class="main-grid">
      <!-- Serveurs à gauche -->
      <aside class="servers-panel">
        <h3>🖥 SERVEURS</h3>
        <div id="server-list" class="server-col"></div>
      </aside>

      <!-- Actualités au centre -->
      <div class="center-col">
        <div class="news-panel" id="news-panel">
          <h3>📰 ACTUALITÉS</h3>
          <div id="news-list"></div>
        </div>

        <div class="bottom-zone">
          <button id="btn-play" class="btn-play" disabled>JOUER</button>
        </div>

        <div class="progress-zone">
          <div class="progress-bar"><div id="progress-fill"></div></div>
          <p id="progress-text"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal paramètres -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-box">
      <h2>⚙ Paramètres</h2>
      <label class="setting-label">
        Mémoire allouée au jeu : <b id="ram-value">4 Go</b>
      </label>
      <input type="range" id="ram-slider" min="2" max="16" step="1" value="4" />
      <button id="btn-gamedir" class="btn-ghost">📁 Ouvrir le dossier du jeu</button>
      <button id="btn-close-settings" class="btn-ghost">Fermer</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
